[config]
build_type = "python"

# Explicitly list only the python provider so Railpack does not auto-detect
# the frontend/ directory and switch to a Node/frontend runtime image.
[providers]
python = true
node = false

# Make Node.js available as an additional package so npm/npx are on PATH
# during the build step (needed to build the React frontend).
[packages]
nodejs = "*"
npm = "*"

[build]
cmd = "pip install -r backend/requirements.txt && cd frontend && npm install && npm run build"

[start]
cmd = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
